[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[variables]
NODE_ENV = "production"
DATABASE_URL = "mysql://root:${{MYSQL_ROOT_PASSWORD}}@${{MYSQL_PRIVATE_DOMAIN}}:3306/${{MYSQL_DATABASE}}"
FRONTEND_URL = "${{RAILWAY_PUBLIC_DOMAIN}}"
PORT = "${{PORT}}"